<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>행크옥션 수익률 계산기</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f7f5;--surface:#fff;--surface2:#f2f2ef;
  --border:#e4e4e0;--border2:#d0d0ca;
  --text:#1a1a18;--text2:#5a5a55;--text3:#9a9a93;
  --accent:#1a5c3a;--accent-light:#e8f3ed;--accent-hover:#154d30;
  --green:#0f6e56;--green-bg:#e1f5ee;
  --amber:#854f0b;--amber-bg:#faeeda;
  --red:#a32d2d;--red-bg:#fcebeb;
}
body{font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:260px;min-width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-head{display:flex;align-items:center;justify-content:space-between;padding:14px 12px 10px;border-bottom:1px solid var(--border)}
.sb-title{font-size:13px;font-weight:600;color:var(--text);letter-spacing:.02em}
.btn-icon{display:flex;align-items:center;justify-content:center;width:28px;height:28px;border:1px solid var(--border2);border-radius:6px;background:var(--surface);color:var(--text2);cursor:pointer}
.btn-icon:hover{background:var(--surface2)}
.btn-add{border-color:var(--accent);color:var(--accent)}
.btn-add:hover{background:var(--accent-light)}
.search-wrap{position:relative;padding:8px 10px;border-bottom:1px solid var(--border)}
.search-ico{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.search-inp{width:100%;padding:5px 8px 5px 26px;font-size:12px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text);outline:none}
.search-inp:focus{border-color:var(--border2);background:var(--surface)}
.case-list{flex:1;overflow-y:auto;padding:4px 0}
.empty{padding:2rem 1rem;text-align:center;color:var(--text3);font-size:12px}
.case-item{padding:10px 12px;cursor:pointer;border-left:3px solid transparent;position:relative}
.case-item:hover{background:var(--surface2)}
.case-item:hover .btn-del{opacity:1}
.case-item.active{background:var(--accent-light);border-left-color:var(--accent)}
.ci-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.ci-num{font-size:12px;font-weight:600;color:var(--text)}
.btn-del{border-color:transparent;opacity:0;transition:opacity .15s;width:22px;height:22px}
.ci-memo{font-size:11px;color:var(--text2);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-pills{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:3px}
.pill{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.pill.green{background:var(--green-bg);color:var(--green);border-color:transparent}
.pill.amber{background:var(--amber-bg);color:var(--amber);border-color:transparent}
.pill.red{background:var(--red-bg);color:var(--red);border-color:transparent}
.ci-date{font-size:10px;color:var(--text3)}
.main{flex:1;overflow-y:auto;padding:24px 32px}
.calc{max-width:900px}
.calc-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.calc-title{font-size:16px;font-weight:600;margin-bottom:10px}
.meta-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.meta-f{display:flex;flex-direction:column;gap:3px}
.meta-f.wide{flex:1;min-width:140px}
.meta-lbl{font-size:10px;color:var(--text3);font-weight:500;letter-spacing:.04em;text-transform:uppercase}
.meta-sep{font-size:13px;font-weight:600;color:var(--text2);margin-top:14px}
.meta-inp{height:32px;padding:0 8px;font-size:13px;border:1px solid var(--border2);border-radius:6px;background:var(--surface2);color:var(--text);outline:none;min-width:76px;font-family:inherit}
.meta-inp:focus{border-color:var(--accent);background:var(--surface)}
.btn-save{padding:8px 20px;background:var(--accent);color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;white-space:nowrap;margin-top:14px}
.btn-save:hover{background:var(--accent-hover)}
.btn-save:disabled{opacity:.6;cursor:not-allowed}
.btn-edit{padding:8px 20px;background:var(--surface);color:var(--accent);border:1.5px solid var(--accent);border-radius:7px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;white-space:nowrap;margin-top:14px}
.btn-edit:hover{background:var(--accent-light)}
.btn-row{display:flex;gap:8px;align-items:flex-end;flex-direction:column}
.readonly-banner{display:none;font-size:11px;color:var(--text3);margin-top:4px;text-align:right}
.is-readonly .readonly-banner{display:block}
.is-readonly .finp:not(.auto){background:var(--bg);color:var(--text);border-color:var(--border);pointer-events:none;-webkit-user-select:none;user-select:none}
.is-readonly .meta-inp{background:var(--bg);color:var(--text);border-color:var(--border);pointer-events:none;-webkit-user-select:none;user-select:none}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:12px}
.card-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.frow{display:grid;grid-template-columns:1fr 160px;align-items:center;gap:8px;margin-bottom:7px}
.flbl{font-size:13px;color:var(--text2)}
.fwrap{display:flex;align-items:center;gap:4px}
.finp{flex:1;height:32px;padding:0 8px;font-size:13px;text-align:right;border:1px solid var(--border2);border-radius:6px;background:var(--surface2);color:var(--text);outline:none;font-family:inherit;width:100%}
.finp:focus{border-color:var(--accent);background:var(--surface)}
.finp.auto{background:var(--bg);color:var(--text3);border-color:var(--border);pointer-events:none}
.fsuf{font-size:12px;color:var(--text3);min-width:14px}
.fdiv{height:1px;background:var(--border);margin:10px 0}
.trow{display:grid;grid-template-columns:1fr 160px;align-items:center;gap:8px;margin-top:6px}
.tlbl{font-size:13px;font-weight:600;color:var(--text)}
.tval{font-size:14px;font-weight:600;color:var(--text);text-align:right}
.trow.hl .tlbl,.trow.hl .tval{color:var(--accent)}
.ag{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.ac{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px}
.ac-title{font-size:13px;font-weight:600;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.ac .frow{grid-template-columns:1fr 110px}
.crow{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text2);margin-bottom:6px}
.crow.bold{font-weight:600;color:var(--text);font-size:13px}
.pos{color:var(--green)}.neg{color:var(--red)}
.mbox{margin-top:12px;background:var(--surface2);border-radius:8px;padding:12px}
.mbox-lbl{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.mbox-val{font-size:18px;font-weight:600;color:var(--text);margin-bottom:6px}
.ybadge{display:inline-block;font-size:11px;font-weight:600;padding:3px 8px;border-radius:5px}
.ybadge.green{background:var(--green-bg);color:var(--green)}
.ybadge.amber{background:var(--amber-bg);color:var(--amber)}
.ybadge.red{background:var(--red-bg);color:var(--red)}
.toasts{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:999}
.toast{padding:10px 16px;border-radius:8px;font-size:13px;font-weight:500;color:#fff;animation:fadeIn .2s ease}
.toast.ok{background:#0f6e56}.toast.err{background:#a32d2d}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
@media(max-width:860px){.ag{grid-template-columns:1fr}.main{padding:16px}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sb-head">
      <span class="sb-title">사건 목록</span>
      <button class="btn-icon btn-add" id="btnNew" title="새 사건">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
    <div class="search-wrap">
      <svg class="search-ico" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-inp" id="searchInp" type="text" placeholder="사건번호, 타경 검색">
    </div>
    <div class="case-list" id="caseList"></div>
  </aside>

  <main class="main">
    <div class="calc">
      <div class="calc-head">
        <div>
          <div class="calc-title">🏠 부동산 경매 수익률 계산기</div>
          <div class="meta-row">
            <div class="meta-f"><span class="meta-lbl">사건번호</span><input class="meta-inp" id="caseNum" placeholder="예: 2024" style="width:80px"></div>
            <span class="meta-sep">타경</span>
            <div class="meta-f"><input class="meta-inp" id="caseCode" placeholder="예: 12345" style="width:90px"></div>
            <div class="meta-f wide"><span class="meta-lbl">주소/메모</span><input class="meta-inp" id="memo" placeholder="선택 입력"></div>
            <div class="meta-f"><span class="meta-lbl">작성일</span><input class="meta-inp" id="dateField" type="date" style="width:132px"></div>
            <div class="meta-f"><span class="meta-lbl">입찰일</span><input class="meta-inp" id="bidDate" type="date" style="width:132px"></div>
            <div class="meta-f"><span class="meta-lbl">감정가</span><input class="meta-inp" id="appraisalPrice" type="number" placeholder="예: 95000000" style="width:140px"></div>
          </div>
        </div>
        <div class="btn-row">
          <button class="btn-save" id="btnSave">저장</button>
          <button class="btn-edit" id="btnEdit" style="display:none">수정</button>
          <span class="readonly-banner">읽기 전용 — 수정하려면 수정 버튼을 누르세요</span>
        </div>
      </div>

      <div class="card">
        <div class="card-title">▌ 초기 투자비</div>
        <div class="frow"><label class="flbl">낙찰가</label><div class="fwrap"><input class="finp" id="bidPrice" type="number" value="72000000"><span class="fsuf" id="appraisalRatio" style="white-space:nowrap;font-size:11px;color:var(--amber);font-weight:600;min-width:52px"></span></div></div>
        <div class="frow"><label class="flbl">은행대출 비율</label><div class="fwrap"><input class="finp" id="loanRatio" type="number" value="80"><span class="fsuf">%</span></div></div>
        <div class="frow"><label class="flbl">은행대출액</label><div class="fwrap"><input class="finp auto" id="loanAmt" type="number" readonly></div></div>
        <div class="frow"><label class="flbl">입찰보증금</label><div class="fwrap"><input class="finp" id="deposit" type="number" value="6300000"></div></div>
        <div class="fdiv"></div>
        <div class="frow"><label class="flbl">취득세 비율</label><div class="fwrap"><input class="finp" id="taxRatio" type="number" value="4.6" step="0.1"><span class="fsuf">%</span></div></div>
        <div class="frow"><label class="flbl">취득세</label><div class="fwrap"><input class="finp auto" id="taxAmt" type="number" readonly></div></div>
        <div class="frow"><label class="flbl">법무비용</label><div class="fwrap"><input class="finp" id="legalFee" type="number" value="500000"></div></div>
        <div class="fdiv"></div>
        <div class="frow"><label class="flbl">인수 보증금</label><div class="fwrap"><input class="finp" id="takeover" type="number" value="0"></div></div>
        <div class="frow"><label class="flbl">명도비(이사비)</label><div class="fwrap"><input class="finp" id="eviction" type="number" value="0"></div></div>
        <div class="frow"><label class="flbl">미납 관리비</label><div class="fwrap"><input class="finp" id="unpaidMgmt" type="number" value="0"></div></div>
        <div class="frow"><label class="flbl">수리비</label><div class="fwrap"><input class="finp" id="repair" type="number" value="0"></div></div>
        <div class="frow"><label class="flbl">중개비</label><div class="fwrap"><input class="finp" id="brokerage" type="number" value="500000"></div></div>
        <div class="fdiv"></div>
        <div class="trow"><span class="tlbl">총 자기자본</span><span class="tval" id="totalEquity">—</span></div>
        <div class="trow hl"><span class="tlbl">총 투자금액</span><span class="tval" id="totalInvest">—</span></div>
      </div>

      <div class="ag">
        <div class="ac">
          <div class="ac-title">💰 월세</div>
          <div class="frow"><label class="flbl">보증금</label><div class="fwrap"><input class="finp" id="rentDeposit" type="number" value="5000000"></div></div>
          <div class="frow"><label class="flbl">월 임대료</label><div class="fwrap"><input class="finp" id="monthlyRent" type="number" value="430000"></div></div>
          <div class="crow"><span>연 임대수입</span><span class="pos" id="annualRent">—</span></div>
          <div class="fdiv"></div>
          <div class="frow"><label class="flbl">대출이자율</label><div class="fwrap"><input class="finp" id="loanRate" type="number" value="3.5" step="0.1"><span class="fsuf">%</span></div></div>
          <div class="crow"><span>연 대출이자</span><span class="neg" id="annualInterest">—</span></div>
          <div class="frow"><label class="flbl">관리비(연)</label><div class="fwrap"><input class="finp" id="mgmtCost" type="number" value="0"></div></div>
          <div class="fdiv"></div>
          <div class="crow bold"><span>연 순수익</span><span id="netRent">—</span></div>
          <div class="mbox">
            <div class="mbox-lbl">실투자금 (월세)</div>
            <div class="mbox-val" id="realInvestRent">—</div>
            <span class="ybadge" id="rentYieldBadge">—</span>
          </div>
        </div>
        <div class="ac">
          <div class="ac-title">🏠 전세</div>
          <div class="frow"><label class="flbl">전세금</label><div class="fwrap"><input class="finp" id="jeonseAmt" type="number" value="75000000"></div></div>
          <div class="frow"><label class="flbl">관리비(연)</label><div class="fwrap"><input class="finp" id="jeonseOps" type="number" value="0"></div></div>
          <div class="fdiv"></div>
          <div class="crow"><span>총수입 (전세금)</span><span class="pos" id="jeonseNet">—</span></div>
          <div class="crow bold"><span>잔여 자기자본</span><span id="jeonseResidual">—</span></div>
          <div class="mbox">
            <div class="mbox-lbl">실투자금 (전세)</div>
            <div class="mbox-val" id="realInvestJeonse">—</div>
            <span class="ybadge" id="jeonseBadge">—</span>
          </div>
        </div>
        <div class="ac">
          <div class="ac-title">📈 매도</div>
          <div class="frow"><label class="flbl">매도가격</label><div class="fwrap"><input class="finp" id="salePrice" type="number" value="78000000"></div></div>
          <div class="frow"><label class="flbl">양도소득세율</label><div class="fwrap"><input class="finp" id="capGainTaxRate" type="number" value="6" step="0.1"><span class="fsuf">%</span></div></div>
          <div class="crow"><span>양도소득세</span><span class="neg" id="capGainTax">—</span></div>
          <div class="frow"><label class="flbl">기타지출</label><div class="fwrap"><input class="finp" id="saleOther" type="number" value="0"></div></div>
          <div class="fdiv"></div>
          <div class="crow"><span>매도 차익</span><span id="saleGross">—</span></div>
          <div class="crow bold"><span>세후 순이익</span><span id="saleNet">—</span></div>
          <div class="mbox">
            <div class="mbox-lbl">자기자본 수익률</div>
            <div class="mbox-val" id="saleYield">—</div>
            <span class="ybadge" id="saleBadge">—</span>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<div class="toasts" id="toasts"></div>

<script>
const SUPABASE_URL='https://iwetxsuddueoqpzijsvy.supabase.co'
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml3ZXR4c3VkZHVlb3Fwemlqc3Z5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NjgyODAsImV4cCI6MjA5NzQ0NDI4MH0.4mbmIfEJffj_eTX_Ss0KjgiR5HNKC3qYyondrplKm0E'
const HEADERS={'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
const TABLE=SUPABASE_URL+'/rest/v1/cases'

let cases=[]
let activeId=null

async function loadCases(){
  try{
    const res=await fetch(TABLE+'?order=updated_at.desc',{headers:{...HEADERS,'Prefer':'return=representation'}})
    if(!res.ok)throw new Error(await res.text())
    cases=await res.json()
  }catch(e){toast('목록 불러오기 실패: '+e.message,'err');cases=[]}
}

function toast(msg,type='ok'){
  const d=document.createElement('div')
  d.className='toast '+type
  d.textContent=msg
  document.getElementById('toasts').appendChild(d)
  setTimeout(()=>d.remove(),2800)
}

function g(id){return parseFloat(document.getElementById(id)?.value)||0}
function fmt(n){return Math.round(n).toLocaleString('ko-KR')+'원'}
function pct(n){return n.toFixed(2)+'%'}
function yc(v){return v>=5?'green':v>=2?'amber':'red'}

function calcFromForm(){
  const bid=g('bidPrice'),loanR=g('loanRatio')/100,taxR=g('taxRatio')/100
  const loanAmt=bid*loanR,taxAmt=bid*taxR
  const acqCost=taxAmt+g('legalFee')
  const other=g('takeover')+g('eviction')+g('unpaidMgmt')+g('repair')+g('brokerage')
  const totalInvest=bid+acqCost+other
  const totalEquity=bid-loanAmt+acqCost+other
  const annualRent=g('monthlyRent')*12
  const annualInterest=loanAmt*(g('loanRate')/100)
  const netRent=annualRent-annualInterest-g('mgmtCost')
  const realRent=totalEquity-g('rentDeposit')
  const rentYield=realRent>0?(netRent/realRent)*100:0
  const jNet=g('jeonseAmt')-g('jeonseOps')
  const realJeonse=totalEquity-g('jeonseAmt')
  const saleGross=g('salePrice')-bid
  const capTax=saleGross>0?saleGross*(g('capGainTaxRate')/100):0
  const saleNet=saleGross-capTax-g('saleOther')
  const saleYield=totalEquity>0?(saleNet/totalEquity)*100:0
  const saleROI=totalInvest>0?(saleNet/totalInvest)*100:0
  return{loanAmt,taxAmt,totalInvest,totalEquity,annualRent,annualInterest,netRent,realRent,rentYield,jNet,realJeonse,saleGross,capTax,saleNet,saleYield,saleROI}
}

function calcFromData(d){
  const bid=+d.bidPrice||0,loanR=(+d.loanRatio||0)/100,taxR=(+d.taxRatio||0)/100
  const loanAmt=bid*loanR,taxAmt=bid*taxR
  const acqCost=taxAmt+(+d.legalFee||0)
  const other=(+d.takeover||0)+(+d.eviction||0)+(+d.unpaidMgmt||0)+(+d.repair||0)+(+d.brokerage||0)
  const totalEquity=bid-loanAmt+acqCost+other
  const annualRent=(+d.monthlyRent||0)*12
  const annualInterest=loanAmt*((+d.loanRate||0)/100)
  const netRent=annualRent-annualInterest-(+d.mgmtCost||0)
  const realRent=totalEquity-(+d.rentDeposit||0)
  const rentYield=realRent>0?(netRent/realRent)*100:0
  return{rentYield}
}

function s(id,v){const el=document.getElementById(id);if(el)el.textContent=v}
function si(id,v){const el=document.getElementById(id);if(el)el.value=Math.round(v)}

function updateCalc(){
  const r=calcFromForm()
  si('loanAmt',r.loanAmt);si('taxAmt',r.taxAmt)
  const appraisal=parseFloat(document.getElementById('appraisalPrice')?.value)||0
  const ratioEl=document.getElementById('appraisalRatio')
  if(ratioEl) ratioEl.textContent=appraisal>0?'('+((g('bidPrice')/appraisal)*100).toFixed(1)+'%)':''

  s('totalEquity',fmt(r.totalEquity));s('totalInvest',fmt(r.totalInvest))
  s('annualRent',fmt(r.annualRent))
  s('annualInterest',fmt(r.annualInterest))
  const netEl=document.getElementById('netRent')
  netEl.textContent=(r.netRent>=0?'+':'')+fmt(r.netRent)
  netEl.className=r.netRent>=0?'pos':'neg'
  s('realInvestRent',fmt(r.realRent))
  const ryb=document.getElementById('rentYieldBadge')
  ryb.textContent='연 수익률 '+pct(r.rentYield);ryb.className='ybadge '+yc(r.rentYield)
  s('jeonseNet',fmt(r.jNet))
  s('jeonseResidual',fmt(Math.abs(r.realJeonse)))
  s('realInvestJeonse',fmt(r.totalEquity))
  const jb=document.getElementById('jeonseBadge')
  jb.textContent=r.realJeonse<=0?'전세금으로 투자금 회수됨':'잔여 '+fmt(r.realJeonse)
  jb.className='ybadge '+(r.realJeonse<=0?'green':'amber')
  const sgEl=document.getElementById('saleGross')
  sgEl.textContent=(r.saleGross>=0?'+':'')+fmt(r.saleGross);sgEl.className=r.saleGross>=0?'pos':'neg'
  s('capGainTax',fmt(r.capTax))
  const snEl=document.getElementById('saleNet')
  snEl.textContent=(r.saleNet>=0?'+':'')+fmt(r.saleNet);snEl.className=r.saleNet>=0?'pos':'neg'
  s('saleYield',pct(r.saleYield))
  const sb=document.getElementById('saleBadge')
  sb.textContent='총투자 대비 '+pct(r.saleROI);sb.className='ybadge '+(r.saleROI>=10?'green':r.saleROI>=5?'amber':'red')
}

const FIELDS=['bidPrice','loanRatio','deposit','taxRatio','legalFee','takeover','eviction','unpaidMgmt','repair','brokerage','rentDeposit','monthlyRent','loanRate','mgmtCost','jeonseAmt','jeonseOps','salePrice','capGainTaxRate','saleOther','appraisalPrice']
const META=['caseNum','caseCode','memo','dateField','bidDate']

function getFormData(){
  const d={}
  META.forEach(k=>{d[k]=document.getElementById(k)?.value||''})
  FIELDS.forEach(k=>{d[k]=parseFloat(document.getElementById(k)?.value)||0})
  return d
}

function setFormData(d){
  META.forEach(k=>{const el=document.getElementById(k);if(el)el.value=d[k]??''})
  FIELDS.forEach(k=>{const el=document.getElementById(k);if(el)el.value=d[k]??0})
  updateCalc()
}

const DEFAULT={bidPrice:72000000,loanRatio:80,deposit:6300000,taxRatio:4.6,legalFee:500000,takeover:0,eviction:0,unpaidMgmt:0,repair:0,brokerage:500000,rentDeposit:5000000,monthlyRent:430000,loanRate:3.5,mgmtCost:0,jeonseAmt:75000000,jeonseOps:0,salePrice:78000000,capGainTaxRate:6,saleOther:0}

function resetForm(){
  document.getElementById('caseNum').value=''
  document.getElementById('caseCode').value=''
  document.getElementById('memo').value=''
  document.getElementById('dateField').value=new Date().toISOString().slice(0,10)
  FIELDS.forEach(k=>{const el=document.getElementById(k);if(el)el.value=DEFAULT[k]??0})
  updateCalc()
}

function renderList(){
  const q=document.getElementById('searchInp').value.toLowerCase()
  const filtered=cases.filter(c=>(c.caseNum||'').toLowerCase().includes(q)||(c.caseCode||'').toLowerCase().includes(q)||(c.memo||'').toLowerCase().includes(q))
  const el=document.getElementById('caseList')
  if(filtered.length===0){el.innerHTML=`<div class="empty">${q?'검색 결과 없음':'저장된 사건이 없습니다'}</div>`;return}
  el.innerHTML=filtered.map(c=>{
    const r=calcFromData(c)
    const yClass=yc(r.rentYield)
    const isActive=c.id===activeId
    return`<div class="case-item${isActive?' active':''}" data-id="${c.id}">
      <div class="ci-top">
        <span class="ci-num">${c.caseNum||'—'} 타경 ${c.caseCode||'—'}</span>
        <button class="btn-icon btn-del" data-del="${c.id}">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      ${c.memo?`<div class="ci-memo">${c.memo}</div>`:''}
      ${c.appraisalPrice?`<div class="ci-pills"><span class="pill">감정가 ${fmt(+c.appraisalPrice)}</span></div>`:''}
      <div class="ci-date">${c.bidDate?`입찰 ${c.bidDate}`:''}</div>
    </div>`
  }).join('')

  el.querySelectorAll('.case-item').forEach(item=>{
    item.addEventListener('click',e=>{
      if(e.target.closest('[data-del]'))return
      activeId=item.dataset.id
      const found=cases.find(c=>c.id===activeId)
      if(found)setFormData(found)
      setReadonly()
      renderList()
    })
  })
  el.querySelectorAll('[data-del]').forEach(btn=>{
    btn.addEventListener('click',async e=>{
      e.stopPropagation()
      const id=btn.dataset.del
      if(!confirm('이 사건을 삭제할까요?'))return
      try{
        const res=await fetch(TABLE+'?id=eq.'+id,{method:'DELETE',headers:HEADERS})
        if(!res.ok)throw new Error(await res.text())
        if(activeId===id){activeId=null;resetForm();setEditable()}
        await loadCases();renderList();toast('삭제되었습니다.')
      }catch(e){toast('삭제 실패: '+e.message,'err')}
    })
  })
}

function setReadonly(){
  document.querySelector('.calc').classList.add('is-readonly')
  document.getElementById('btnSave').style.display='none'
  document.getElementById('btnEdit').style.display='block'
}

function setEditable(){
  document.querySelector('.calc').classList.remove('is-readonly')
  document.getElementById('btnSave').style.display='block'
  document.getElementById('btnEdit').style.display='none'
}

document.getElementById('btnNew').addEventListener('click',()=>{activeId=null;resetForm();setEditable();renderList()})

document.getElementById('btnEdit').addEventListener('click',()=>{setEditable()})

document.getElementById('btnSave').addEventListener('click',async()=>{
  const btnSave=document.getElementById('btnSave')
  btnSave.disabled=true;btnSave.textContent='저장 중...'
  const data=getFormData()
  try{
    if(activeId){
      const res=await fetch(TABLE+'?id=eq.'+activeId,{
        method:'PATCH',
        headers:{...HEADERS,'Prefer':'return=representation'},
        body:JSON.stringify({...data,updated_at:new Date().toISOString()})
      })
      if(!res.ok)throw new Error(await res.text())
    }else{
      const res=await fetch(TABLE,{
        method:'POST',
        headers:{...HEADERS,'Prefer':'return=representation'},
        body:JSON.stringify(data)
      })
      if(!res.ok)throw new Error(await res.text())
      const rows=await res.json()
      if(rows&&rows[0])activeId=rows[0].id
    }
    await loadCases();renderList();toast('저장되었습니다.');setReadonly()
  }catch(e){toast('저장 실패: '+e.message,'err')}
  finally{btnSave.disabled=false;btnSave.textContent='저장'}
})

document.getElementById('searchInp').addEventListener('input',renderList)
document.querySelector('.calc').addEventListener('input',updateCalc)

;(async()=>{
  document.getElementById('caseList').innerHTML='<div class="empty">불러오는 중...</div>'
  document.getElementById('dateField').value=new Date().toISOString().slice(0,10)
  await loadCases()
  renderList()
  updateCalc()
})()
</script>
</body>
</html>
